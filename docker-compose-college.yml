version: "3.8"

services:

  college-web:
    build: ./public/college-portal
    container_name: college-container

    ports:
      - "3015:3000"

    env_file:
      - .env

    depends_on:
      - mysql

  mysql:
    image: mysql:8
    container_name: college-db

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: college_db

    ports:
      - "3306:3306"

    restart: always
